<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" />
      <stop offset="40%" stop-color="#F9F1D8" />
      <stop offset="60%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#8A6300" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.3" />
    </filter>
  </defs>
  <g transform="translate(100, 100)" filter="url(#shadow)">
    <!-- B -->
    <text x="-45" y="0" font-family="'Times New Roman', Times, serif" font-size="90" font-weight="normal" fill="url(#gold)">B</text>
    <!-- S intertwined slightly -->
    <text x="-5" y="15" font-family="'Times New Roman', Times, serif" font-size="100" font-style="italic" font-weight="normal" fill="url(#gold)">S</text>
  </g>
</svg>
